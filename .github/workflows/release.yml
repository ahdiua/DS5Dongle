name: Build release firmware

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build; a GitHub Release is created if it does not exist
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and upload release UF2
    uses: ./.github/workflows/build-firmware.yml
    with:
      ref: ${{ github.event.release.tag_name || inputs.tag }}
      version: ${{ github.event.release.tag_name || inputs.tag }}
      asset_suffix: -${{ github.event.release.tag_name || inputs.tag }}
      upload_tag: ${{ github.event.release.tag_name || inputs.tag }}
      picow: true
      waveshare: true
